<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Auto-Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --bg: #1a1a1a; 
            --fg: #e0e0e0; 
            --accent: #00adb5; 
            --del: #ff6b6b; 
            --add: #6bff6b; 
            --panel: #252525;
            --hover: #333;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Courier New', monospace; 
            background: var(--bg); 
            color: var(--fg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100dvh; /* Dynamic viewport height for mobile browsers */
            overflow: hidden; 
        }

        /* --- Global Components --- */
        button { background: var(--accent); border: none; padding: 10px 16px; color: #000; font-weight: bold; cursor: pointer; border-radius: 6px; transition: opacity 0.2s; }
        button:hover { opacity: 0.85; }
        button:active { transform: scale(0.98); }
        input, select { background: #333; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; font-family: inherit; }
        input:focus, select:focus { outline: 1px solid var(--accent); }
        .hidden { display: none !important; }

        /* --- Auth Guard --- */
        #auth-guard { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        #login-box { background: var(--panel); padding: 30px; border: 1px solid var(--accent); border-radius: 12px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #login-box input { display: block; width: 100%; margin-bottom: 15px; }
        #login-box button { width: 100%; padding: 12px; font-size: 1.1em; }

        /* --- Main Layout --- */
        #app-container { display: flex; width: 100%; height: 100%; position: relative; }
        
        /* Sidebar Overlay for Mobile */
        #sidebar-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; backdrop-filter: blur(2px); }

        #sidebar { width: 280px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 1010; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Sidebar Internal Layout */
        .sidebar-section { padding: 15px; border-bottom: 1px solid #333; }
        .sidebar-section h3, .sidebar-section h4 { margin: 0 0 10px 0; font-size: 1.1em; }
        
        #book-controls { display: flex; flex-direction: column; gap: 10px; }
        #book-select { width: 100%; }
        
        #chapter-list-container { flex: 1; overflow-y: auto; padding: 15px; }
        .chapter-btn { display: block; width: 100%; padding: 12px 10px; margin-bottom: 8px; background: #333; color: #fff; text-align: left; font-weight: normal; }
        .chapter-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        
        #sidebar-footer { padding: 15px; background: #1e1e1e; border-top: 1px solid #333; }
        #sidebar-footer p { margin: 0 0 10px 0; font-size: 0.9em; color: #aaa; }
        #sidebar-footer button { width: 100%; }

        /* Main Editing Area */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; min-width: 0; }
        
        #toolbar { padding: 15px; background: var(--panel); border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 12px; }
        .toolbar-top { display: flex; align-items: center; gap: 10px; }
        .toolbar-actions { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
        
        /* Hide scrollbar for actions but allow scrolling */
        .toolbar-actions::-webkit-scrollbar { height: 4px; }
        .toolbar-actions::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        
        .toolbar-actions button { flex-shrink: 0; padding: 8px 12px; font-size: 0.9em; }
        
        #hamburger-btn { display: none; background: transparent; color: var(--fg); font-size: 1.8rem; padding: 0 10px 0 0; }
        #chapter-title { flex: 1; font-size: 1.1em; font-weight: bold; }

        #editor-container { flex: 1; overflow-y: auto; padding: 20px 5%; line-height: 1.8; font-size: 1.1em; }
        #editor { min-height: 100%; white-space: pre-wrap; word-wrap: break-word; outline: none; }

        #feedback-panel { height: 25vh; min-height: 150px; border-top: 1px solid #333; padding: 15px; overflow-y: auto; background: #1e1e1e; font-size: 0.95em; }
        #feedback-panel h4 { margin: 0 0 10px 0; color: var(--accent); }

        /* --- Words & Interactive Elements --- */
        span.word { cursor: pointer; border-radius: 3px; transition: background 0.2s; display: inline; line-height: inherit; }
        span.word:hover { background: #444; }
        span.changed-word { background: rgba(0, 173, 181, 0.2); border-bottom: 2px solid var(--accent); }
        
        /* --- Modal --- */
        #synonym-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); padding: 25px; border: 1px solid var(--accent); border-radius: 8px; display: none; z-index: 2000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 90%; max-width: 400px; }
        #synonym-modal h4 { margin-top: 0; margin-bottom: 15px; }
        .syn-option { display: block; width: 100%; padding: 12px; background: #444; margin-bottom: 8px; font-weight: normal; color: #fff; text-align: left; }
        .syn-option:hover { background: var(--accent); color: #000; font-weight: bold; }

        /* --- RESPONSIVE MOBILE & TABLET --- */
        @media (max-width: 850px) {
            #hamburger-btn { display: block; }
            #sidebar { 
                position: absolute; 
                top: 0; 
                left: 0; 
                height: 100%; 
                transform: translateX(-100%); 
            }
            #sidebar.open { transform: translateX(0); }
            #sidebar-overlay.open { display: block; }
            #editor-container { padding: 15px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="auth-guard">
        <div id="login-box">
            <h2 style="margin-top:0;">Proofreader Admin</h2>
            <input type="email" id="auth-email" placeholder="Admin Email">
            <input type="password" id="auth-password" placeholder="Password">
            <button onclick="window.loginUser()">Secure Login</button>
            <p id="auth-error" style="color: var(--del); font-size: 0.9em; display: none; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        
        <div id="sidebar-overlay" onclick="window.toggleSidebar()"></div>

        <div id="sidebar">
            <div class="sidebar-section">
                <h3>📚 Library</h3>
                <div id="book-controls">
                    <select id="book-select" onchange="window.switchBook()">
                        <option>Loading books...</option>
                    </select>
                    <button onclick="window.createNewBook()" style="background: #444; color: #fff;">+ New Book</button>
                </div>
            </div>

            <div id="chapter-list-container">
                <h4>Chapters</h4>
                <div id="chapter-list"></div>
                <button onclick="window.createNewChapter()" style="margin-top: 15px; width: 100%;">+ New Chapter</button>
            </div>

            <div id="sidebar-footer">
                <p id="word-counter">Words: 0</p>
                <button onclick="window.toggleChangesView()" style="background: #444; color: #fff; margin-bottom: 10px;">Review Changes</button>
                <a href="/export" target="_blank" style="text-decoration: none;">
                    <button style="background: var(--add);">Export .docx</button>
                </a>
            </div>
        </div>

        <div id="main">
            <div id="toolbar">
                <div class="toolbar-top">
                    <button id="hamburger-btn" onclick="window.toggleSidebar()">☰</button>
                    <input type="text" id="chapter-title" placeholder="Chapter Title">
                </div>
                <div class="toolbar-actions">
                    <button onclick="window.undo()" style="background: #444; color:#fff;">⏪ Undo</button>
                    <button onclick="window.redo()" style="background: #444; color:#fff;">⏩ Redo</button>
                    <button onclick="window.getAICritique()">🤖 AI Review</button>
                    <button onclick="window.saveChapter()">💾 Save</button>
                </div>
            </div>
            
            <div id="editor-container">
                <div id="editor" contenteditable="true">Loading environment...</div>
            </div>

            <div id="feedback-panel">
                <h4>AI Feedback</h4>
                <div id="ai-output">No analysis yet.</div>
            </div>
        </div>
    </div>

    <div id="synonym-modal">
        <h4>Select Replacement</h4>
        <div id="synonym-list"></div>
        <button onclick="window.closeModal()" style="margin-top: 15px; background: #555; color: #fff; width: 100%;">Cancel</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4W3E68Yl0uG9RvgOl4RlXOHZHft-ai5E",
            authDomain: "prasst-1.firebaseapp.com",
            projectId: "prasst-1",
            storageBucket: "prasst-1.firebasestorage.app",
            messagingSenderId: "871529331595",
            appId: "1:871529331595:web:581f56f6e8c323cebb4d8e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Global State
        window.currentChapterId = 1;
        window.originalText = "";
        window.wordsArray = [];
        window.changes = [];
        window.undoStack = [];
        window.redoStack = [];
        window.currentBookId = "book_1";
        window.aiHistory = []; 

        // UI Toggle logic for Mobile Sidebar
        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        };

        // Authentication State Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-guard').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                // Initialize the books system first
                window.loadBooks();
            } else {
                document.getElementById('auth-guard').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        // Login Handler
        window.loginUser = async function() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const errDisplay = document.getElementById('auth-error');
            errDisplay.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                errDisplay.innerText = "Invalid credentials. Try again.";
                errDisplay.style.display = 'block';
            }
        };

        // Library & Book Logic
        window.loadBooks = async function() {
            const querySnapshot = await getDocs(collection(db, "books"));
            const select = document.getElementById('book-select');
            select.innerHTML = '';
            
            let hasBooks = false;
            querySnapshot.forEach((docSnap) => {
                hasBooks = true;
                const data = docSnap.data();
                const option = document.createElement('option');
                option.value = docSnap.id;
                option.innerText = data.name || docSnap.id;
                select.appendChild(option);
            });

            if (!hasBooks) {
                // Create a default book if none exist
                await setDoc(doc(db, "books", "book_1"), { name: "My First Book" });
                const option = document.createElement('option');
                option.value = "book_1";
                option.innerText = "My First Book";
                select.appendChild(option);
            }

            window.currentBookId = select.value;
            await window.loadChapterList();
        };

        window.createNewBook = async function() {
            const bookName = prompt("Enter new book name:");
            if (!bookName) return;
            const newBookId = "book_" + Date.now();
            
            await setDoc(doc(db, "books", newBookId), { name: bookName });
            window.currentBookId = newBookId;
            
            const select = document.getElementById('book-select');
            const option = document.createElement('option');
            option.value = newBookId;
            option.innerText = bookName;
            select.appendChild(option);
            select.value = newBookId;
            
            await window.createNewChapter();
        };

        window.switchBook = async function() {
            window.currentBookId = document.getElementById('book-select').value;
            await window.loadChapterList();
            
            // Auto-close sidebar on mobile after switching books
            if(window.innerWidth <= 850) window.toggleSidebar();
        };

        // Chapter Logic
        window.loadChapterList = async function() {
            const querySnapshot = await getDocs(collection(db, "books", window.currentBookId, "chapters"));
            const list = document.getElementById('chapter-list');
            list.innerHTML = '';
            
            let ids = [];
            querySnapshot.forEach((docSnap) => {
                ids.push(parseInt(docSnap.id));
                const data = docSnap.data();
                const btn = document.createElement('button');
                btn.className = `chapter-btn ${docSnap.id == window.currentChapterId ? 'active' : ''}`;
                btn.innerText = data.title || `Chapter ${docSnap.id}`;
                btn.onclick = () => window.loadChapter(docSnap.id);
                list.appendChild(btn);
            });
            
            if (ids.length === 0) {
                window.createNewChapter();
            } else if (document.querySelector('.chapter-btn')) {
                document.querySelector('.chapter-btn').click();
            }
        };

        window.createNewChapter = async function() {
            const querySnapshot = await getDocs(collection(db, "books", window.currentBookId, "chapters"));
            let ids = [];
            querySnapshot.forEach((docSnap) => ids.push(parseInt(docSnap.id)));
            
            const newId = ids.length > 0 ? Math.max(...ids) + 1 : 1;
            window.currentChapterId = newId;
            window.originalText = "";
            window.wordsArray = [];
            window.changes = [];
            window.aiHistory = [];
            window.renderEditor();
            document.getElementById('chapter-title').value = `Chapter ${newId}`;
            
            await window.saveChapter(true); 
        };

        window.loadChapter = async function(id) {
            window.currentChapterId = id;
            document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
            
            const docRef = doc(db, "books", window.currentBookId, "chapters", id.toString());
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                const data = docSnap.data();
                window.originalText = data.content || "";
                window.changes = data.changes || [];
                window.aiHistory = data.history || [];
                document.getElementById('chapter-title').value = data.title || `Chapter ${id}`;
                
                if (window.aiHistory.length > 0) {
                    const lastMsg = window.aiHistory[window.aiHistory.length - 1];
                    if (lastMsg.role === 'assistant') {
                        document.getElementById('ai-output').innerHTML = marked.parse(lastMsg.content);
                    }
                } else {
                    document.getElementById('ai-output').innerHTML = "No analysis yet.";
                }

            } else {
                window.originalText = "Paste your chapter content here...";
                window.changes = [];
                window.aiHistory = [];
                document.getElementById('ai-output').innerHTML = "No analysis yet.";
            }
            
            window.wordsArray = window.originalText.split(' ');
            window.renderEditor();
            
            // Auto-close sidebar on mobile after selecting a chapter
            if(window.innerWidth <= 850 && document.getElementById('sidebar').classList.contains('open')) {
                window.toggleSidebar();
            }
        };

        window.saveChapter = async function(silent = false) {
            const titleVal = document.getElementById('chapter-title').value;
            const payload = {
                content: window.originalText,
                changes: window.changes,
                title: titleVal,
                word_count: window.wordsArray.length,
                history: window.aiHistory
            };
            
            await setDoc(doc(db, "books", window.currentBookId, "chapters", window.currentChapterId.toString()), payload);
            
            if (!silent) alert('Chapter Saved to Firebase');
            
            const activeBtn = document.querySelector('.chapter-btn.active');
            if (activeBtn) activeBtn.innerText = titleVal;
            
            if (silent) window.loadChapterList();
        };

        // Editor Rendering
        window.renderEditor = function() {
            const editor = document.getElementById('editor');
            editor.innerHTML = '';
            window.wordsArray.forEach((word, index) => {
                const span = document.createElement('span');
                span.className = 'word';
                span.dataset.index = index;
                span.id = `w-${index}`;
                
                const change = window.changes.find(c => c.word_index === index);
                if (change) {
                    span.innerText = change.new_word + ' ';
                    span.classList.add('changed-word');
                    span.title = `Original: ${change.original_word}`;
                } else {
                    span.innerText = word + ' ';
                }
                
                span.ondblclick = (e) => window.handleDoubleTap(e, index, word);
                editor.appendChild(span);
            });
            document.getElementById('word-counter').innerText = `Words: ${window.wordsArray.length}`;
            
            document.querySelectorAll('.chapter-btn').forEach(b => {
                if (b.innerText === document.getElementById('chapter-title').value) {
                    b.classList.add('active');
                }
            });
        };

        // Input Listener
        document.getElementById('editor').addEventListener('input', (e) => {
            if (window.wordsArray.length <= 1) {
                window.originalText = e.target.innerText;
                window.wordsArray = window.originalText.split(' ');
                window.renderEditor();
            }
        });

        // AI & Synonym Logic
        window.handleDoubleTap = async function(e, index, word) {
            e.preventDefault();
            const start = Math.max(0, index - 5);
            const end = Math.min(window.wordsArray.length, index + 5);
            const context = window.wordsArray.slice(start, end).join(' ');

            const modal = document.getElementById('synonym-modal');
            const list = document.getElementById('synonym-list');
            list.innerHTML = 'Loading AI suggestions...';
            modal.style.display = 'block';

            try {
                const res = await fetch('/api/ai/synonyms', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ word: word, context: context })
                });
                
                const synonyms = await res.json();
                list.innerHTML = '';
                synonyms.forEach(syn => {
                    const btn = document.createElement('button');
                    btn.className = 'syn-option';
                    btn.innerText = syn;
                    btn.onclick = () => window.applyChange(index, word, syn, 'synonym');
                    list.appendChild(btn);
                });
            } catch (error) {
                list.innerHTML = 'Backend connection error.';
            }
        };

        window.closeModal = function() {
            document.getElementById('synonym-modal').style.display = 'none';
        };

        // Undo/Redo/Changes Logic
        window.applyChange = function(index, oldWord, newWord, type) {
            window.undoStack.push({ type: 'add', change: { word_index: index, original_word: oldWord, new_word: newWord, type: type }});
            window.redoStack = [];
            window.changes = window.changes.filter(c => c.word_index !== index);
            window.changes.push({ word_index: index, original_word: oldWord, new_word: newWord, error_type: type, status: 'accepted' });
            window.closeModal();
            window.renderEditor();
        };

        window.undo = function() {
            if (window.undoStack.length === 0) return;
            const action = window.undoStack.pop();
            if (action.type === 'add') {
                window.changes = window.changes.filter(c => c.word_index !== action.change.word_index);
                window.redoStack.push(action);
            }
            window.renderEditor();
        };

        window.redo = function() {
            if (window.redoStack.length === 0) return;
            const action = window.redoStack.pop();
            if (action.type === 'add') {
                window.changes.push(action.change);
                window.undoStack.push(action);
            }
            window.renderEditor();
        };

        window.toggleChangesView = function() {
            let changeLog = "Changes made:\n\n";
            window.changes.forEach(c => {
                changeLog += `- "${c.original_word}" ➡️ "${c.new_word}"\n`;
            });
            alert(window.changes.length ? changeLog : "No changes recorded yet.");
        };

        // AI Critique Logic
        window.getAICritique = async function() {
            const btn = document.querySelector('.toolbar-actions button:nth-child(3)');
            const originalText = btn.innerText;
            btn.innerText = "Analyzing...";
            const currentText = document.getElementById('editor').innerText;
            
            try {
                const res = await fetch('/api/ai/critique', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: currentText, history: window.aiHistory })
                });
                
                const data = await res.json();
                
                window.aiHistory.push({role: "user", content: "Analyzed current chapter text."});
                window.aiHistory.push({role: "assistant", content: data.critique});
                
                document.getElementById('ai-output').innerHTML = marked.parse(data.critique);
                btn.innerText = originalText;
                
                window.saveChapter(true); 
            } catch (error) {
                document.getElementById('ai-output').innerHTML = "Backend connection error.";
                btn.innerText = originalText;
            }
        };
    </script>
</body>
</html>
