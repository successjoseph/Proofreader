<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Auto-Editor</title>
    <style>
        :root { --bg: #1a1a1a; --fg: #e0e0e0; --accent: #00adb5; --del: #ff6b6b; --add: #6bff6b; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--fg); margin: 0; display: flex; height: 100vh; }
        
        /* Layout */
        #sidebar { width: 250px; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #toolbar { padding: 10px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: #252525; }
        #editor-container { flex: 1; overflow-y: auto; padding: 40px; line-height: 1.8; font-size: 1.1em; white-space: pre-wrap; }
        #feedback-panel { height: 150px; border-top: 1px solid #333; padding: 20px; overflow-y: auto; background: #222; font-size: 0.9em; }

        /* Components */
        .chapter-btn { display: block; width: 100%; padding: 10px; margin-bottom: 5px; background: #333; color: #fff; border: none; cursor: pointer; text-align: left; }
        .chapter-btn.active { background: var(--accent); color: #000; }
        button { background: var(--accent); border: none; padding: 8px 16px; color: #000; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { opacity: 0.9; }
        input { background: #333; border: 1px solid #444; color: #fff; padding: 5px; width: 200px; }

        /* 🎁 Indexing & Highlights */
        span.word { cursor: pointer; padding: 0 1px; border-radius: 2px; transition: background 0.2s; }
        span.word:hover { background: #333; }
        span.changed-word { background: rgba(0, 173, 181, 0.2); border-bottom: 2px solid var(--accent); }
        
        /* Modal */
        #synonym-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 20px; border: 1px solid var(--accent); display: none; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .syn-option { display: block; width: 100%; padding: 10px; background: #444; margin-bottom: 5px; border: none; color: #fff; cursor: pointer; }
        .syn-option:hover { background: var(--accent); color: #000; }

        /* Helper Classes */
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>📖 Chapters</h3>
    <div id="chapter-list"></div>
    <button onclick="createNewChapter()" style="margin-top: 10px;">+ New Chapter</button>
    <div style="margin-top: auto;">
        <p id="word-counter">Words: 0</p>
        <a href="/export" target="_blank"><button style="width:100%">Export .docx</button></a>
    </div>
</div>

<div id="main">
    <div id="toolbar">
        <div>
            <input type="text" id="chapter-title" placeholder="Chapter Title">
        </div>
        <div>
            <button onclick="undo()">↶ Undo</button>
            <button onclick="redo()">↷ Redo</button>
            <button onclick="getAICritique()">🤖 AI Review</button>
            <button onclick="saveChapter()">💾 Save</button>
        </div>
    </div>
    
    <div id="editor-container">
        <div id="editor" contenteditable="true">Wait...</div>
    </div>

    <div id="feedback-panel">
        <strong>AI Feedback:</strong> <span id="ai-output">No analysis yet.</span>
    </div>
</div>

<div id="synonym-modal">
    <h4>Select Replacement</h4>
    <div id="synonym-list"></div>
    <button onclick="closeModal()" style="margin-top: 10px; background: #555; color: #fff;">Cancel</button>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4W3E68Yl0uG9RvgOl4RlXOHZHft-ai5E",
        authDomain: "prasst-1.firebaseapp.com",
        projectId: "prasst-1",
        storageBucket: "prasst-1.firebasestorage.app",
        messagingSenderId: "871529331595",
        appId: "1:871529331595:web:581f56f6e8c323cebb4d8e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Globalizing state for inline HTML handlers
    window.currentChapterId = 1;
    window.originalText = "";
    window.wordsArray = [];
    window.changes = [];
    window.undoStack = [];
    window.redoStack = [];

    document.addEventListener('DOMContentLoaded', () => {
        window.loadChapterList();
        window.loadChapter(1);
    });

    window.loadChapterList = async function() {
        const querySnapshot = await getDocs(collection(db, "chapters"));
        const list = document.getElementById('chapter-list');
        list.innerHTML = '';
        
        let ids = [];
        querySnapshot.forEach((doc) => {
            ids.push(parseInt(doc.id));
            const btn = document.createElement('button');
            btn.className = `chapter-btn ${doc.id == window.currentChapterId ? 'active' : ''}`;
            btn.innerText = `Chapter ${doc.id}`;
            btn.onclick = () => window.loadChapter(doc.id);
            list.appendChild(btn);
        });
        
        if(ids.length === 0) window.createNewChapter();
    };

    window.createNewChapter = async function() {
        const querySnapshot = await getDocs(collection(db, "chapters"));
        let ids = [];
        querySnapshot.forEach((doc) => ids.push(parseInt(doc.id)));
        
        const newId = ids.length > 0 ? Math.max(...ids) + 1 : 1;
        window.currentChapterId = newId;
        window.originalText = "";
        window.wordsArray = [];
        window.changes = [];
        window.renderEditor();
        document.getElementById('chapter-title').value = `Chapter ${newId}`;
        window.loadChapterList();
    };

    window.loadChapter = async function(id) {
        window.currentChapterId = id;
        document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
        
        const docRef = doc(db, "chapters", id.toString());
        const docSnap = await getDoc(docRef);
        
        if (docSnap.exists()) {
            const data = docSnap.data();
            window.originalText = data.content;
            window.changes = data.changes || [];
            document.getElementById('chapter-title').value = data.title || `Chapter ${id}`;
        } else {
            window.originalText = "Paste your chapter content here...";
            window.changes = [];
        }
        window.wordsArray = window.originalText.split(' ');
        window.renderEditor();
    };

    window.saveChapter = async function() {
        const payload = {
            content: window.originalText,
            changes: window.changes,
            title: document.getElementById('chapter-title').value,
            word_count: window.wordsArray.length
        };
        await setDoc(doc(db, "chapters", window.currentChapterId.toString()), payload);
        alert('Chapter Saved to Firebase');
        window.loadChapterList();
    };

    window.renderEditor = function() {
        const editor = document.getElementById('editor');
        editor.innerHTML = '';
        window.wordsArray.forEach((word, index) => {
            const span = document.createElement('span');
            span.className = 'word';
            span.dataset.index = index;
            span.id = `w-${index}`;
            
            const change = window.changes.find(c => c.word_index === index);
            if (change) {
                span.innerText = change.new_word + ' ';
                span.classList.add('changed-word');
                span.title = `Original: ${change.original_word}`;
            } else {
                span.innerText = word + ' ';
            }
            
            span.ondblclick = (e) => window.handleDoubleTap(e, index, word);
            editor.appendChild(span);
        });
        document.getElementById('word-counter').innerText = `Words: ${window.wordsArray.length}`;
    };

    window.handleDoubleTap = async function(e, index, word) {
        e.preventDefault();
        const start = Math.max(0, index - 5);
        const end = Math.min(window.wordsArray.length, index + 5);
        const context = window.wordsArray.slice(start, end).join(' ');

        const modal = document.getElementById('synonym-modal');
        const list = document.getElementById('synonym-list');
        list.innerHTML = 'Loading AI suggestions...';
        modal.style.display = 'block';

        const res = await fetch('http://localhost:5000/api/ai/synonyms', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ word: word, context: context })
        });
        
        const synonyms = await res.json();
        list.innerHTML = '';
        synonyms.forEach(syn => {
            const btn = document.createElement('button');
            btn.className = 'syn-option';
            btn.innerText = syn;
            btn.onclick = () => window.applyChange(index, word, syn, 'synonym');
            list.appendChild(btn);
        });
    };

    window.closeModal = function() {
        document.getElementById('synonym-modal').style.display = 'none';
    };

    window.applyChange = function(index, oldWord, newWord, type) {
        window.undoStack.push({ type: 'add', change: { word_index: index, original_word: oldWord, new_word: newWord, type: type }});
        window.redoStack = [];
        window.changes = window.changes.filter(c => c.word_index !== index);
        window.changes.push({ word_index: index, original_word: oldWord, new_word: newWord, error_type: type, status: 'accepted' });
        window.closeModal();
        window.renderEditor();
    };

    window.undo = function() {
        if (window.undoStack.length === 0) return;
        const action = window.undoStack.pop();
        if (action.type === 'add') {
            window.changes = window.changes.filter(c => c.word_index !== action.change.word_index);
            window.redoStack.push(action);
        }
        window.renderEditor();
    };

    window.redo = function() {
        if (window.redoStack.length === 0) return;
        const action = window.redoStack.pop();
        if (action.type === 'add') {
            window.changes.push(action.change);
            window.undoStack.push(action);
        }
        window.renderEditor();
    };

    window.getAICritique = async function() {
        const btn = document.querySelector('#toolbar button:nth-child(3)');
        btn.innerText = "Analyzing...";
        const currentText = document.getElementById('editor').innerText;
        const res = await fetch('http://localhost:5000/api/ai/critique', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text: currentText })
        });
        const data = await res.json();
        document.getElementById('ai-output').innerText = data.critique;
        btn.innerText = "🤖 AI Review";
    };

    document.getElementById('editor').addEventListener('input', (e) => {
        if (window.wordsArray.length <= 1) {
            window.originalText = e.target.innerText;
            window.wordsArray = window.originalText.split(' ');
            window.renderEditor();
        }
    });
</script>
</body>
</html>
